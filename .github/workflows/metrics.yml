name: Metrics
on:

  schedule: [{cron: "0 */12 * * *"}]

  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@master
        with:
          token: ${{ secrets.METRICS_TOKEN }}


          user: ahyanistheEmty
          template: classic
          base: ""
          config_timezone: Asia/Shanghai
          config_display: large
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          extras_css: |

            .row section:last-child .field:nth-child(6) {
              display: none !important;
              visibility: hidden !important;
              opacity: 0 !important;
              height: 0 !important;
              width: 0 !important;
              margin: 0 !important;
              padding: 0 !important;
              font-size: 0 !important;
            }
          extras_js: |
            document.querySelectorAll(".field").forEach(el => {
              if (el.textContent.includes("Average per day")) {
                el.remove()
              }
            })
  

